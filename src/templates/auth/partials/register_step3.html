<!-- STEP 3: Fitness Profile -->
<div class="step" id="step-3">
    <div class="form-group">
        <label class="form-label"><i class="fas fa-bullseye"></i> What's your fitness goal?</label>
        <div class="fitness-goal-cards">
            <div class="goal-card" onclick="selectGoal('Weight Loss', this)">
                <i class="fas fa-fire"></i><span>Weight Loss</span>
            </div>
            <div class="goal-card" onclick="selectGoal('Muscle Gain', this)">
                <i class="fas fa-dumbbell"></i><span>Muscle Gain</span>
            </div>
            <div class="goal-card" onclick="selectGoal('Endurance', this)">
                <i class="fas fa-running"></i><span>Endurance</span>
            </div>
            <div class="goal-card" onclick="selectGoal('Maintenance', this)">
                <i class="fas fa-balance-scale"></i><span>Maintenance</span>
            </div>
        </div>
    </div>

    <div class="form-group">
        <label class="form-label"><i class="fas fa-signal"></i> Fitness Level</label>
        <div class="level-cards">
            <div class="level-card" onclick="selectLevel('Beginner', this)">
                <i class="fas fa-seedling"></i><span>Beginner</span>
            </div>
            <div class="level-card" onclick="selectLevel('Intermediate', this)">
                <i class="fas fa-bolt"></i><span>Intermediate</span>
            </div>
            <div class="level-card" onclick="selectLevel('Advanced', this)">
                <i class="fas fa-trophy"></i><span>Advanced</span>
            </div>
        </div>
    </div>

    <div class="form-group">
        <label class="form-label"><i class="fas fa-heartbeat"></i> Activity Level</label>
        <div class="activity-cards">
            <div class="activity-card" onclick="selectActivity('Sedentary', this)">
                <i class="fas fa-bed"></i>
                <span>Sedentary</span>
                <small>Little to no exercise</small>
            </div>
            <div class="activity-card" onclick="selectActivity('Lightly Active', this)">
                <i class="fas fa-walking"></i>
                <span>Light</span>
                <small>1-3 days / week</small>
            </div>
            <div class="activity-card" onclick="selectActivity('Moderately Active', this)">
                <i class="fas fa-running"></i>
                <span>Moderate</span>
                <small>3-5 days / week</small>
            </div>
            <div class="activity-card" onclick="selectActivity('Very Active', this)">
                <i class="fas fa-fire"></i>
                <span>Active</span>
                <small>6-7 days / week</small>
            </div>
        </div>
    </div>

    <div class="step-nav">
        <button type="button" class="btn-back" onclick="goToStep(3, 2)"><i class="fas fa-arrow-left me-2"></i> Back</button>
        <button type="submit" class="btn-next" id="submitBtn">
            <i class="fas fa-user-plus me-2"></i> Create Account
        </button>
    </div>
</div>
