{% extends "admin/base.html" %}

{% block title %}Edit User - Admin Panel{% endblock %}
{% block page_title %}Edit User: {{ user.username }}{% endblock %}

{% block admin_content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card border-0 shadow-sm">
            <div class="card-body p-4">
                <form method="POST">
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label text-white fw-bold">First Name</label>
                            <input type="text" name="first_name" class="form-control" value="{{ user.first_name }}" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label text-white fw-bold">Last Name</label>
                            <input type="text" name="last_name" class="form-control" value="{{ user.last_name }}" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label text-white fw-bold">Email Address</label>
                        <input type="email" name="email" class="form-control" value="{{ user.email }}" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label text-white fw-bold">Username</label>
                        <input type="text" name="username" class="form-control" value="{{ user.username }}" required>
                    </div>

                    <div class="mb-4">
                        <label class="form-label text-white fw-bold">Subscription Plan</label>
                        <select name="subscription_plan" class="form-select">
                            <option value="free" {% if user.subscription_plan == 'free' %}selected{% endif %}>Free</option>
                            <option value="basic" {% if user.subscription_plan == 'basic' %}selected{% endif %}>Basic</option>
                            <option value="pro" {% if user.subscription_plan == 'pro' %}selected{% endif %}>Pro</option>
                            <option value="elite" {% if user.subscription_plan == 'elite' %}selected{% endif %}>Elite</option>
                        </select>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary px-4">Update User</button>
                        <a href="{{ url_for('admin.users') }}" class="btn btn-outline-light px-4">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
