<!-- Main Charts Row -->
<div class="charts-grid mb-4">
    <!-- Revenue & Visits Area Chart -->
    <div class="chart-card main-chart">
        <div class="chart-header">
            <div>
                <h6 class="chart-title">Revenue & Bookings Trend</h6>
                <p class="chart-subtitle">Last 30 days performance</p>
            </div>
            <div class="chart-legend">
                <span class="legend-dot bg-blue"></span> Revenue
                <span class="legend-dot bg-green ms-3"></span> Bookings
            </div>
        </div>
        <div class="chart-body">
            <canvas id="revenueChart"></canvas>
        </div>
    </div>

    <!-- Peak Hours Chart -->
    <div class="chart-card side-chart">
        <div class="chart-header">
            <div>
                <h6 class="chart-title">Peak Hours</h6>
                <p class="chart-subtitle">Busiest times this week</p>
            </div>
        </div>
        <div class="chart-body">
            <canvas id="peakHoursChart"></canvas>
        </div>
    </div>
</div>
